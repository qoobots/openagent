<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" data-stage="middle">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在 | 教育培训智能体</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md">
    <div class="text-8xl mb-6">🔍</div>
    <h1 class="text-4xl font-bold text-gray-800 mb-2">404</h1>
    <p class="text-xl text-gray-600 mb-2">页面不存在</p>
    <p class="text-sm text-gray-500 mb-8">抱歉，您访问的页面不存在或已被移除。请检查网址是否正确，或返回首页浏览。</p>
    <div class="flex gap-3 justify-center">
      <a href="javascript:history.back()" class="btn btn-outline">返回上一页</a>
      <a th:href="@{/}" class="btn btn-primary">返回首页</a>
    </div>
    <!-- 搜索框 -->
    <div class="mt-8">
      <p class="text-sm text-gray-400 mb-3">或者搜索您需要的内容:</p>
      <div class="join w-full max-w-xs">
        <input type="text" placeholder="搜索..." class="input input-bordered join-item flex-1 input-sm">
        <button class="btn btn-primary join-item btn-sm">搜索</button>
      </div>
    </div>
  </div>
</body>
</html>
