server:
  port: 8202
  servlet:
    context-path: /education-agent

spring:
  application:
    name: education-agent

  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 86400  # 静态资源缓存1天
      chain:
        strategy:
          content:
            enabled: true
            paths: /css/**,/js/**,/images/**,/fonts/**

  # Thymeleaf 模板引擎配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false  # 开发环境关闭缓存，生产环境设为true

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/openagent_education_agent
    username: postgres
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 14

  # Kafka配置
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: education-agent-group
      auto-offset-reset: earliest

  # AI 配置 (Spring AI OpenAI)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        enabled: true
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2048
      embedding:
        enabled: true
        options:
          model: text-embedding-3-small
      audio:
        speech:
          enabled: true
          options:
            model: tts-1
            voice: alloy
        transcription:
          enabled: true
          options:
            model: whisper-1

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Agent配置
agent:
  id: education-agent
  name: 教育培训智能体
  description: 专注于在线教育、智能辅导、学习路径规划的AI智能体

  # 模型配置
  model:
    provider: spring-ai
    chat-model: gpt-4o-mini
    embedding-model: text-embedding-3-small

  # 工具配置
  tools:
    enabled: true
    timeout: 30s

  # 向量配置
  vector:
    enabled: true
    dimension: 1536
    index-type: ivfflat
    metric-type: cosine
    index-lists: 100

  # 安全配置
  security:
    jwt:
      # JWT 签名密钥（生产环境必须通过环境变量注入，长度 ≥ 32 字符）
      secret: ${EDUCATION_AGENT_JWT_SECRET:education-agent-default-jwt-secret-key-min-32-chars-2026}
      issuer: education-agent

# SpringDoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.qoobot: DEBUG
